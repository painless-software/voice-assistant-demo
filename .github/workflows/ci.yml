name: CI

on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        recipe:
        - lint
        - types
        - pytest -v
    name: ${{ matrix.recipe }}
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7
      with:
        python-version: '3.14'
    - uses: taiki-e/install-action@just
    - run: mv .env.example .env
    - run: just ${{ matrix.recipe }}

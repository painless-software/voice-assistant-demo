name: CI

on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        recipe:
        - lint
        - types
        - pytest -v
    name: ${{ matrix.recipe }}
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7
      with:
        python-version: '3.14'
    - uses: taiki-e/install-action@just
    - run: mv .env.example .env
    - run: just ${{ matrix.recipe }}

  docker:
    name: Docker build & smoke test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - run: docker build -t voice-assistant .
    - name: Smoke test /health endpoint
      run: |
        docker run -d --name va -p 8080:8080 \
          -e TWILIO_ACCOUNT_SID=test \
          -e TWILIO_AUTH_TOKEN=test \
          -e TWILIO_PHONE_NUMBER=+10000000000 \
          -e GOOGLE_API_KEY=test \
          voice-assistant
        for i in $(seq 1 10); do
          if curl -sf http://localhost:8080/health; then exit 0; fi
          sleep 1
        done
        docker logs va
        exit 1
    - name: Verify dev dependencies are excluded
      run: |
        docker run --rm voice-assistant python -c "import pytest" 2>&1 && exit 1 || exit 0

  deploy:
    name: Deploy to Cloud Run
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
    - ci
    - docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: production
    steps:
    - uses: actions/checkout@v6
    - uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
    - uses: google-github-actions/setup-gcloud@v3
    - uses: taiki-e/install-action@just
    - run: mv .env.example .env
    - run: just deploy
